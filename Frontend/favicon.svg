<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Dark outer square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Gradient inner glow square (inset) -->
  <rect x="4" y="4" width="24" height="24" rx="5" fill="url(#pill)" opacity="0.25"/>

  <!-- Accent top stripe -->
  <rect x="4" y="4" width="24" height="3" rx="1.5" fill="url(#pill)" opacity="0.9"/>

  <!-- Task lines -->
  <!-- Line 1 (with check accent) -->
  <rect x="13" y="11.5" width="12" height="2" rx="1" fill="white" opacity="0.85"/>
  <!-- Line 2 -->
  <rect x="13" y="16.5" width="10" height="2" rx="1" fill="white" opacity="0.55"/>
  <!-- Line 3 -->
  <rect x="13" y="21.5" width="7"  height="2" rx="1" fill="white" opacity="0.35"/>

  <!-- Checkmark bullet on line 1 -->
  <circle cx="9" cy="12.5" r="2.5" fill="url(#pill)"/>
  <polyline
    points="7.3,12.5 8.5,13.8 10.8,11.2"
    fill="none"
    stroke="white"
    stroke-width="1.3"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Dot bullets for lines 2 & 3 -->
  <circle cx="9" cy="17.5" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="9" cy="22.5" r="1.5" fill="white" opacity="0.25"/>
</svg>
