<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyTask</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">EasyTask</div>
    <div class="header-right">
        <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" class="search-input" id="search" placeholder="Search tasks…">
        </div>
        <div class="badge" id="taskCount">0 Tasks</div>
    </div>
</header>

<main>

    <!-- SIDEBAR: create form -->
    <aside class="sidebar">
        <div class="sidebar-eyebrow">Task Manager</div>
        <div class="sidebar-heading">Create a new task</div>

        <form id="taskForm">
            <div class="form-group">
                <label class="form-label" for="title">Title</label>
                <input class="glass-input" type="text" id="title" placeholder="What needs to be done?" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea class="glass-input" id="description" placeholder="Add any details…" required></textarea>
            </div>
            <button type="submit" class="create-btn">+ Create Task</button>
        </form>

        <p class="sidebar-footer">Tasks sync with your server in real time.</p>
    </aside>

<section class="content">
    <div class="content-header">
        <div class="content-heading">Your Tasks</div>
        <div class="content-sub">Everything you need to get done</div>
    </div>

    <div id="loadingTasks" class="loading-state">
        <div class="spinner"></div>
        <h3>Loading your tasks...</h3>
        <p>Please wait as we set up your workspace, please be patient.</p>
    </div>

    <div id="taskList" class="task-list"></div>
</section>

</main>

<script src="script.js"></script>

</body>
</html>
