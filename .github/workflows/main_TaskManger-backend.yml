name: Deploy Backend to Azure Web App
 
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/main_TaskManger-backend.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      # ✅ FIXED AUTH (THIS IS THE IMPORTANT PART)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: TaskManger-backend
          package: ./backend
